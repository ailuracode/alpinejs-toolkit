<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@ailuracode/alpine-query-kit E2E fixture</title>
  </head>
  <body>
    <main
      id="app"
      data-e2e-ready="true"
      x-data="{ userQuery: null }"
      x-init="userQuery = $store.query.observe(['user'], async () => ({ name: 'Ada' }))"
    >
      <h1>Query Kit E2E fixture</h1>
      <output id="query-status" x-text="userQuery?.status ?? 'idle'"></output>
      <output id="query-data" x-text="userQuery?.data?.name ?? 'none'"></output>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
