<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@ailuracode/alpine-player E2E fixture</title>
  </head>
  <body>
    <main id="app" data-e2e-ready="true" x-data>
      <h1>Player E2E fixture</h1>

      <section>
        <h2>Audio</h2>
        <audio id="audio-el" x-audio="audioPlayer"></audio>
        <button id="audio-toggle" type="button" @click="audioPlayer.toggle()">Toggle audio</button>
        <output id="audio-state" data-testid="audio-state" x-text="audioPlayer.paused ? 'paused' : 'playing'"></output>
      </section>

      <section>
        <h2>Video</h2>
        <video id="video-el" x-video="videoPlayer"></video>
        <button id="video-mute" type="button" @click="videoPlayer.toggleMute()">Toggle mute</button>
        <output id="video-muted" data-testid="video-muted" x-text="videoPlayer.muted ? 'muted' : 'unmuted'"></output>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
