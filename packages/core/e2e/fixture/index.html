<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@ailuracode/alpine-core E2E fixture</title>
  </head>
  <body>
    <main id="app" data-e2e-ready="true" x-data x-init>
      <h1>Core E2E fixture</h1>
      <p>Resolved theme: <output id="resolved-theme" x-text="$store.theme.resolved"></output></p>
      <button type="button" @click="$store.theme.toggle()">Toggle theme</button>

      <section
        id="plugin-event-demo"
        x-data="pluginEventDemo"
        @toggle:change="toggleDetail = $event.detail"
        @theme:change.window="themeDetail = $event.detail"
      >
        <button type="button" id="dispatch-toggle" @click="dispatchToggle($el.closest('#plugin-event-demo'))">
          Dispatch toggle change
        </button>
        <button type="button" id="dispatch-theme" @click="dispatchTheme()">
          Dispatch theme change
        </button>
        <output id="toggle-detail" x-text="toggleDetail ? JSON.stringify(toggleDetail) : ''"></output>
        <output id="theme-detail" x-text="themeDetail ? JSON.stringify(themeDetail) : ''"></output>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
