  - '@ailuracode/alpinejs-network@1.0.0'
  - '@ailuracode/alpinejs-notify@0.2.0'
  - '@ailuracode/alpinejs-screen@0.2.0'
  - '@ailuracode/alpinejs-scroll@0.2.0'
  - '@ailuracode/alpinejs-theme@0.2.0'
  - '@ailuracode/alpinejs-touch@0.2.0'
  - '@astrojs/markdown-satteri@0.3.1'
  - astro@7.0.0

patchedDependencies:
  '@changesets/cli@2.31.0': patches/@changesets__cli@2.31.0.patch
  tsup@8.5.1: patches/tsup@8.5.1.patch
