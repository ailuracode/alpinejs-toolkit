name: Release

on:
  push:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Version packages or publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$HOME/.npmrc"
          fi

          shopt -s nullglob
          pending=(.changeset/*.md)
          has_changesets=false

          for file in "${pending[@]}"; do
            if [ "$(basename "$file")" != "README.md" ]; then
              has_changesets=true
              break
            fi
          done

          if [ "$has_changesets" = true ]; then
            case "${GITHUB_REF_NAME}" in
              main|master) ;;
              *)
                echo "Pending changesets on ${GITHUB_REF_NAME}. Versioning runs only on main/master."
                exit 0
                ;;
            esac

            pnpm run version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Version Packages"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Version Packages commit pushed to ${GITHUB_REF_NAME}."
          fi

          case "${GITHUB_REF_NAME}" in
            main|master) ;;
            *)
              echo "Publishing runs only on main/master. Skipping."
              exit 0
              ;;
          esac

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is not configured. Add an npm publish token in repository secrets before releasing."
            exit 1
          fi

          pnpm run publish:ci
