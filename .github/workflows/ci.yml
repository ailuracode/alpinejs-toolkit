name: CI

# Change-aware validation: detect affected workspaces first, then run only the
# checks required for the detected change category. A final gate job always runs
# on pull requests so documentation-only changes remain mergeable.

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [master]
    paths:
      - "packages/**"
      - "apps/demo/**"
      - "test/**"
      - "scripts/**"
      - "patches/**"
      - ".github/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "benchmarks/**"
      - "e2e/**"
      - "biome.json"
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - ".cursor/**"
      - ".changeset/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}
      run_full: ${{ steps.changes.outputs.run_full }}
      run_validate: ${{ steps.changes.outputs.run_validate }}
      run_audit: ${{ steps.changes.outputs.run_audit }}
      run_coverage: ${{ steps.changes.outputs.run_coverage }}
      run_repo_check: ${{ steps.changes.outputs.run_repo_check }}
      run_pack: ${{ steps.changes.outputs.run_pack }}
      run_size: ${{ steps.changes.outputs.run_size }}
      run_demo: ${{ steps.changes.outputs.run_demo }}
      run_e2e: ${{ steps.changes.outputs.run_e2e }}
      pack_packages: ${{ steps.changes.outputs.pack_packages }}
      build_filters: ${{ steps.changes.outputs.build_filters }}
      test_paths: ${{ steps.changes.outputs.test_paths }}
      e2e_packages: ${{ steps.changes.outputs.e2e_packages }}
      summary: ${{ steps.changes.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect changes
        id: changes
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_REF: ${{ github.ref }}
          CI_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
          CI_HEAD_REF: HEAD
          FORCE_FULL_CI: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: node scripts/ci-changes.mjs --github

      - name: Summarize detection
        run: echo "${{ steps.changes.outputs.summary }}"

  validate:
    needs: detect
    if: needs.detect.outputs.run_validate == 'true' || needs.detect.outputs.run_audit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Lint
        if: needs.detect.outputs.run_validate == 'true'
        run: pnpm run lint

      - name: Typecheck
        if: needs.detect.outputs.run_validate == 'true'
        run: pnpm run typecheck

      - name: Architecture invariants
        if: needs.detect.outputs.run_validate == 'true'
        run: pnpm run architecture:check

      - name: Repository consistency
        if: needs.detect.outputs.run_validate == 'true' && (needs.detect.outputs.run_repo_check == 'true' || needs.detect.outputs.run_full == 'true')
        run: pnpm run repo:check

      - name: Build all packages
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_full == 'true'
        run: pnpm run build

      - name: Build affected packages
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_full != 'true' && needs.detect.outputs.build_filters != ''
        run: |
          set -euo pipefail
          cmd=(pnpm -r)
          IFS=',' read -ra filters <<< "${{ needs.detect.outputs.build_filters }}"
          for filter in "${filters[@]}"; do
            if [ -n "$filter" ]; then
              cmd+=(--filter "$filter")
            fi
          done
          cmd+=(build)
          "${cmd[@]}"

      - name: Run tests with coverage
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_coverage == 'true'
        run: pnpm run test:coverage

      - name: Run affected tests
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_coverage != 'true' && needs.detect.outputs.test_paths != ''
        run: pnpm exec vitest run --config vitest.config.ts ${{ needs.detect.outputs.test_paths }}

      - name: Validate package tarballs
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_pack == 'true'
        run: |
          set -euo pipefail
          if [ "${{ needs.detect.outputs.run_full }}" = "true" ]; then
            node scripts/pack-check.mjs
          else
            node scripts/pack-check.mjs --packages "${{ needs.detect.outputs.pack_packages }}"
          fi

      - name: Validate built export surfaces
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_pack == 'true'
        run: |
          set -euo pipefail
          if [ "${{ needs.detect.outputs.run_full }}" = "true" ]; then
            node scripts/repo-check.mjs --built
          else
            node scripts/repo-check.mjs --built --packages "${{ needs.detect.outputs.pack_packages }}"
          fi

      - name: Enforce bundle-size budgets
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_size == 'true'
        run: |
          set -euo pipefail
          if [ "${{ needs.detect.outputs.run_full }}" = "true" ]; then
            pnpm run size
          else
            cmd=(pnpm -r)
            IFS=',' read -ra folders <<< "${{ needs.detect.outputs.pack_packages }}"
            for folder in "${folders[@]}"; do
              if [ -n "$folder" ]; then
                cmd+=(--filter "@ailuracode/alpine-${folder}")
              fi
            done
            cmd+=(run size)
            "${cmd[@]}"
          fi

      - name: Build demo app
        if: needs.detect.outputs.run_validate == 'true' && needs.detect.outputs.run_demo == 'true'
        run: pnpm run build:demo

      - name: Audit critical vulnerabilities
        if: needs.detect.outputs.run_audit == 'true'
        run: pnpm audit --audit-level critical

  e2e:
    needs: detect
    if: needs.detect.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: |
          set -euo pipefail
          if [ "${{ needs.detect.outputs.run_full }}" = "true" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            pnpm run playwright:install:all
          else
            pnpm run playwright:install
          fi

      - name: Run Playwright E2E (full browser matrix)
        if: needs.detect.outputs.run_full == 'true' && github.event_name == 'schedule'
        run: pnpm run test:e2e:full

      - name: Run Playwright E2E (Chromium baseline)
        if: needs.detect.outputs.run_full != 'true' || github.event_name != 'schedule'
        env:
          E2E_BROWSER_PROFILE: pr
        run: |
          set -euo pipefail
          if [ "${{ needs.detect.outputs.run_full }}" = "true" ]; then
            pnpm run test:e2e
          elif [ -n "${{ needs.detect.outputs.e2e_packages }}" ]; then
            node scripts/e2e-run.mjs --packages "${{ needs.detect.outputs.e2e_packages }}"
          else
            echo "No affected E2E packages"
          fi

  gate:
    needs: [detect, validate, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check CI gate
        env:
          DOCS_ONLY: ${{ needs.detect.outputs.docs_only }}
          RUN_VALIDATE: ${{ needs.detect.outputs.run_validate }}
          RUN_AUDIT: ${{ needs.detect.outputs.run_audit }}
          RUN_E2E: ${{ needs.detect.outputs.run_e2e }}
          DETECT_RESULT: ${{ needs.detect.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          set -euo pipefail

          if [ "$DETECT_RESULT" != "success" ]; then
            echo "detect job did not succeed"
            exit 1
          fi

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "Documentation-only changes — CI gate passed"
            exit 0
          fi

          if { [ "$RUN_VALIDATE" = "true" ] || [ "$RUN_AUDIT" = "true" ]; } && [ "$VALIDATE_RESULT" != "success" ]; then
            echo "validate job did not succeed"
            exit 1
          fi

          if [ "$RUN_E2E" = "true" ] && [ "$E2E_RESULT" != "success" ]; then
            echo "e2e job did not succeed"
            exit 1
          fi

          echo "CI gate passed"
