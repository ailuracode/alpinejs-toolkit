name: CI

# Trigger policy: CI runs only for dependency/manifest, shared tooling, scripts,
# GitHub Actions setup, packages, demo app, and shared test harness changes.
# Docs-only, Cursor rules, and other metadata edits do not trigger CI.
# Maintenance: extend this allowlist when adding new repo-level inputs CI consumes
# (see .cursor/rules/tooling-configs.mdc).

on:
  push:
    branches: [master]
    paths:
      - "packages/**"
      - "apps/demo/**"
      - "test/**"
      - "scripts/**"
      - "patches/**"
      - ".github/actions/**"
      - ".github/workflows/ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "biome.json"
      - ".size-limit.json"
  pull_request:
    branches: [master]
    paths:
      - "packages/**"
      - "apps/demo/**"
      - "test/**"
      - "scripts/**"
      - "patches/**"
      - ".github/actions/**"
      - ".github/workflows/ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "biome.json"
      - ".size-limit.json"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests with coverage
        run: pnpm run test:coverage

  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package tarballs
        run: pnpm run pack:check

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit critical vulnerabilities
        run: pnpm audit --audit-level critical

  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      # `size-limit` enforces the `.size-limit.json` budgets — fails
      # the PR if any committed package exceeds its gzip / brotli budget.
      # Run locally with `pnpm run size:check` before pushing.
      - name: Enforce bundle-size budgets
        run: pnpm run size

  # changeset check removed — publishing is manual
