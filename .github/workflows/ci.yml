name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "packages/**"
  pull_request:
    branches: [main, master]
    paths:
      - "packages/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests with coverage
        run: pnpm run test:coverage

  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package tarballs
        run: pnpm run pack:check

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit critical vulnerabilities
        run: pnpm audit --audit-level critical

  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      # `size-limit` enforces the `.size-limit.json` budgets — fails
      # the PR if any committed package exceeds its gzip / brotli budget.
      # Run locally with `pnpm run size:check` before pushing.
      - name: Enforce bundle-size budgets
        run: pnpm run size

  # changeset check removed — publishing is manual
